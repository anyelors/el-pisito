<section class="contenedor">

    <h1>Registro de usuario</h1>

    <section class="contenedor-formulario">

        <form #form="ngForm" (ngSubmit)="register()" [formGroup]="registerForm">

            <div class="mb-3">
                <label for="usuario">USUARIO</label>
                <input type="text" id="usuario" name="usuario" class="form-control" autocomplete="off"
                    [class.is-invalid]="registerForm.get('elUsuario')?.invalid && registerForm.get('elUsuario')?.touched"
                    formControlName="elUsuario">
            </div>

            <div class="mb-3">
                <label for="contrasena">PASSWORD</label>
                <input type="password" id="password" name="password" class="form-control" autocomplete="off"
                    [class.is-invalid]="registerForm.get('elPassword')?.invalid && registerForm.get('elPassword')?.touched"
                    formControlName="elPassword">
            </div>

            <div class="mb-3">
                <label for="email">EMAIL</label>
                <input type="text" id="email" name="email" class="form-control" autocomplete="off"
                    [class.is-invalid]="registerForm.get('elEmail')?.invalid && registerForm.get('elEmail')?.touched"
                    formControlName="elEmail">
            </div>

            <div class="contenedor-boton">
                <button type="submit" class="btn btn-md btn-primary" [disabled]="form.invalid">Registrate</button>
            </div>

        </form>

    </section>

</section>
