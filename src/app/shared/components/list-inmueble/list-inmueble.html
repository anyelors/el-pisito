<section class="contenedor">

    @if(_controlCargaService.cargaCompletada()){
        
        @for (inmueble of inmuebles(); track inmueble.id) {
            
            <app-ficha-inmueble [datos]="inmueble" [dondeEstoy]="dondeEstoy"/>
            
        }

    }@else {
        <app-preloader/>
    }

</section>
